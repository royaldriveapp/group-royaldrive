backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

site_url: "https://group.royaldrive.in"
display_url: "https://group.royaldrive.in"
logo_url: "/images/showroom.png"

editor:
  preview: false

collections:
  - label: "Website"
    name: "website"
    files:
      - label: "Site Content"
        name: "site_content"
        file: "src/data/siteData.json"
        format: "json"
        fields:
          - label: "Site"
            name: "site"
            widget: "object"
            fields:
              - { label: "Site Title", name: "title", widget: "string" }
              - { label: "Site Description", name: "description", widget: "text" }
              - { label: "Brand Name", name: "brandName", widget: "string" }
              - { label: "Brand Tagline", name: "brandTagline", widget: "string" }
              - { label: "Copyright", name: "copyright", widget: "string" }

          - label: "Navigation"
            name: "navigation"
            widget: "object"
            fields:
              - label: "Navigation Links"
                name: "links"
                widget: "list"
                summary: "{{fields.label}}"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Link", name: "href", widget: "string" }

          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Subtitle", name: "subtitle", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Primary CTA"
                name: "primaryCta"
                widget: "object"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Link", name: "href", widget: "string" }
              - label: "Secondary CTA"
                name: "secondaryCta"
                widget: "object"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Link", name: "href", widget: "string" }
              - { label: "YouTube Video ID", name: "videoUrl", widget: "string" }
              - { label: "Video Poster Image", name: "videoPoster", widget: "string" }

          - label: "About"
            name: "about"
            widget: "object"
            fields:
              - { label: "Subtitle", name: "subtitle", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Features"
                name: "features"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - { label: "Icon Class", name: "icon", widget: "string", required: false }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }

          - label: "Why Invest"
            name: "whyInvest"
            widget: "object"
            fields:
              - { label: "Subtitle", name: "subtitle", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Stats"
                name: "stats"
                widget: "list"
                summary: "{{fields.label}}"
                fields:
                  - { label: "Value", name: "value", widget: "string" }
                  - { label: "Suffix", name: "suffix", widget: "string", required: false }
                  - { label: "Prefix", name: "prefix", widget: "string", required: false }
                  - { label: "Label", name: "label", widget: "string" }
              - label: "Pillars"
                name: "pillars"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - { label: "Phase", name: "phase", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Icon Class", name: "icon", widget: "string", required: false }
              - label: "Moat Items"
                name: "moatItems"
                widget: "list"
                summary: "{{fields.title}}{{fields.label}}"
                fields:
                  - { label: "Title", name: "title", widget: "string", required: false }
                  - { label: "Description", name: "description", widget: "text", required: false }
                  - { label: "Image Path", name: "image", widget: "string", required: false }
                  - { label: "Stat Value", name: "statValue", widget: "string", required: false }
                  - { label: "Stat Suffix", name: "statSuffix", widget: "string", required: false }
                  - { label: "Label", name: "label", widget: "string", required: false }
                  - { label: "Icon Class", name: "icon", widget: "string", required: false }
                  - { label: "Style", name: "style", widget: "string", required: false }

          - label: "FAQ"
            name: "faq"
            widget: "object"
            fields:
              - { label: "Subtitle", name: "subtitle", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Items"
                name: "items"
                widget: "list"
                summary: "{{fields.question}}"
                fields:
                  - { label: "Question", name: "question", widget: "string" }
                  - { label: "Answer", name: "answer", widget: "text" }

          - label: "Contact"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Subtitle", name: "subtitle", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Allocation Options"
                name: "allocationOptions"
                widget: "list"
                summary: "{{fields.label}}"
                fields:
                  - { label: "Value", name: "value", widget: "string" }
                  - { label: "Label", name: "label", widget: "string" }

          - label: "Locations"
            name: "locations"
            widget: "object"
            fields:
              - { label: "Subtitle", name: "subtitle", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Offices"
                name: "offices"
                widget: "list"
                summary: "{{fields.city}}"
                fields:
                  - { label: "City", name: "city", widget: "string" }
                  - { label: "Address", name: "address", widget: "string" }
                  - { label: "Region", name: "region", widget: "string" }
                  - { label: "Phone", name: "phone", widget: "string" }
                  - { label: "Email", name: "email", widget: "string" }
                  - { label: "Map Embed Link", name: "mapEmbed", widget: "text", required: false }

          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Tagline", name: "tagline", widget: "string" }
              - label: "Columns"
                name: "columns"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - label: "Links"
                    name: "links"
                    widget: "list"
                    summary: "{{fields.label}}"
                    fields:
                      - { label: "Label", name: "label", widget: "string" }
                      - { label: "Link", name: "href", widget: "string" }
              - label: "Social Links"
                name: "socials"
                widget: "list"
                summary: "{{fields.icon}}"
                fields:
                  - { label: "Icon Class", name: "icon", widget: "string" }
                  - { label: "Link", name: "href", widget: "string" }
